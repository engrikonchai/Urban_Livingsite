<!DOCTYPE html>
<html lang="me">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Zabjelo objekat — Ekskluzivni stanovi, Podgorica.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zabjelo — Urban Living</title>

  <!-- Preconnect to Google Fonts for faster font load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="objekat3.css">
</head>
<body>

  <!-- BACK BUTTON -->
  <a href="../index.html" class="back-btn">Nazad</a>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="menu-overlay" id="menuOverlay">
    <a href="index.html" class="menu-link">Početna</a>
    <a href="https://www.instagram.com/" target="_blank" class="menu-link">Instagram</a>
  </div>

  <!-- HERO SLIDER -->
  <!-- First image: eager + high priority so it shows instantly -->
  <!-- Other images: lazy so they don't block page load -->
  <div class="building-hero-triple">
    <img src="images/Pogled1.png" class="active" alt="Pogled 1" loading="eager" fetchpriority="high">
    <img src="images/Pogled2.png" alt="Pogled 2" loading="lazy" decoding="async">
    <img src="images/Pogled3.png" alt="Pogled 3" loading="lazy" decoding="async">

    <div class="hero-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- 3D RENDERS SECTION -->
  <div class="renders-section">
    <div class="renders-divider">
      <div class="renders-line"></div>
      <span class="renders-tag">3D Vizualizacija</span>
      <div class="renders-line"></div>
    </div>
    <div class="renders-strip">
      <div class="render-card">
        <img src="images/3D_Desno.jpg" alt="Desna strana" loading="lazy" decoding="async">
        <div class="render-overlay">
          <span class="render-label">Render</span>
          <span class="render-title">Desna strana</span>
        </div>
      </div>
      <div class="render-card">
        <img src="images/3D_Lijevo.jpg" alt="Lijeva strana" loading="lazy" decoding="async">
        <div class="render-overlay">
          <span class="render-label">Render</span>
          <span class="render-title">Lijeva strana</span>
        </div>
      </div>
      <div class="render-card">
        <img src="images/3D_ispred.jpg" alt="Prednja fasada" loading="lazy" decoding="async">
        <div class="render-overlay">
          <span class="render-label">Render</span>
          <span class="render-title">Prednja fasada</span>
        </div>
      </div>
      <div class="render-card">
        <img src="images/3D_iza.jpg" alt="Zadnja fasada" loading="lazy" decoding="async">
        <div class="render-overlay">
          <span class="render-label">Render</span>
          <span class="render-title">Zadnja fasada</span>
        </div>
      </div>
    </div>
  </div>

  <!-- FLOOR NAV -->
  <nav class="floor-nav" id="floorNav">
    <a href="#floor1" class="active">Suteren</a>
    <a href="#floor2">Prizemlje</a>
    <a href="#floor3">Sprat 1</a>
    <a href="#floor4">Sprat 2</a>
  </nav>

  <main class="apartments-page">

    <section class="floor" id="floor1">
      <div class="floor-header">
        <span class="floor-number">00</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Suteren</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Suteren.jpg" alt="Suteren Plan" loading="lazy" decoding="async">
      </div>
    </section>

    <section class="floor" id="floor2">
      <div class="floor-header">
        <span class="floor-number">01</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Prizemlje</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Prizemlje.jpg" alt="Prizemlje Plan" loading="lazy" decoding="async">
      </div>
    </section>

    <section class="floor" id="floor3">
      <div class="floor-header">
        <span class="floor-number">02</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Prvi Sprat</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Sprat1.jpg" alt="Sprat 1 Plan" loading="lazy" decoding="async">
      </div>
    </section>

    <section class="floor" id="floor4">
      <div class="floor-header">
        <span class="floor-number">03</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Drugi Sprat</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Sprat2.jpg" alt="Sprat 2 Plan" loading="lazy" decoding="async">
      </div>
    </section>

  </main>

  <script src="script.js"></script>
  <script src="objekat3.js" defer></script>

</body>
</html>
