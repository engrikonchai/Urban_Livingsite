<!DOCTYPE html>
<html lang="me">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objekat 3 — Urban Living</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="objekat3.css">
</head>
<body>

  <!-- BACK BUTTON -->
  <a href="../index.html" class="back-btn">Nazad</a>

 <!-- <header class="header">
    <div class="logo">
      <img src="images/urbanlivinglogo.png" alt="Urban Living Logo">
    </div>
  </header> -->

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="menu-overlay" id="menuOverlay">
    <a href="index.html" class="menu-link">Početna</a>
    <a href="https://www.instagram.com/" target="_blank" class="menu-link">Instagram</a>
  </div>

  <div class="building-hero-triple">
    <img src="images/Pogled1.png" class="active" alt="Pogled 1">
    <img src="images/Pogled2.png" alt="Pogled 2">
    <img src="images/Pogled3.png" alt="Pogled 3">
    
    <div class="hero-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <nav class="floor-nav" id="floorNav">
    <a href="#floor1" class="active">Suteren</a>
    <a href="#floor2">Prizemlje</a>
    <a href="#floor3">Sprat 1</a>
    <a href="#floor4">Sprat 2</a>
  </nav>

  <main class="apartments-page">

    <section class="floor" id="floor1">
      <div class="floor-header">
        <span class="floor-number">00</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Suteren</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Suteren.png" alt="Suteren Plan">
      </div>
    </section>

    <section class="floor" id="floor2">
      <div class="floor-header">
        <span class="floor-number">01</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Prizemlje</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Prizemlje.png" alt="Prizemlje Plan">
      </div>
    </section>

    <section class="floor" id="floor3">
      <div class="floor-header">
        <span class="floor-number">02</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Prvi Sprat</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Sprat1.png" alt="Sprat 1 Plan">
      </div>
    </section>

    <section class="floor" id="floor4">
      <div class="floor-header">
        <span class="floor-number">03</span>
        <div class="floor-header-content">
          <div class="floor-accent-line"></div>
          <h2>Drugi Sprat</h2>
        </div>
      </div>
      <div class="floor-gallery mobile-scroll">
        <img src="images/Sprat2.png" alt="Sprat 2 Plan">
      </div>
    </section>

  </main>

  <script src="script.js"></script>
  <script src="objekat3.js"></script>

</body>
</html>
