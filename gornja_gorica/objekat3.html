<!DOCTYPE html>
<html lang="me">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objekat 3 — Urban Living</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>

    :root {
      --green: #006b5d;
      --dark:  #1a1a1a;
      --cream: #f2ede6;
      --muted: #999;
    }

    .close-btn { display: none !important; }
    .hamburger:hover, .hamburger.active:hover { background: transparent; }

    .menu-overlay { background: #141414 !important; padding-top: 90px !important; }
    .menu-overlay::before {
      content: 'Urban Living';
      position: absolute; top: 28px; left: 28px;
      font-family: 'Playfair Display', serif;
      font-size: .65rem; letter-spacing: .28em; text-transform: uppercase;
      color: rgba(255,255,255,.15); pointer-events: none;
    }
    .menu-overlay::after {
      content: ''; position: absolute; top: 0; left: 0;
      width: 2px; height: 0; background: var(--green);
      transition: height .55s cubic-bezier(.22,1,.36,1);
    }
    .menu-overlay.active::after { height: 100%; }
    .menu-overlay .menu-link {
      font-family: 'Quicksand', sans-serif !important;
      font-size: 1.1rem !important; font-weight: 600 !important;
      letter-spacing: .16em !important; text-transform: uppercase !important;
      color: rgba(255,255,255,.6) !important;
      padding: 18px 28px !important; position: relative;
      transition: color .3s ease !important; opacity: 0;
    }
    .menu-overlay .menu-link::after {
      content: ''; position: absolute; bottom: 12px; left: 28px;
      width: 0; height: 1px; background: var(--green); transition: width .35s ease;
    }
    .menu-overlay .menu-link:hover        { color: #fff !important; }
    .menu-overlay .menu-link:hover::after  { width: 28px; }
    .menu-overlay .menu-link.active        { color: #fff !important; }
    .menu-overlay .menu-link.active::after { width: 20px; }
    .menu-overlay.active .menu-link { animation: menuSlideIn .45s ease forwards; }
    .menu-overlay.active .menu-link:nth-child(1) { animation-delay: .05s; }
    .menu-overlay.active .menu-link:nth-child(2) { animation-delay: .12s; }
    .menu-overlay.active .menu-link:nth-child(3) { animation-delay: .19s; }
    .menu-overlay.active .menu-link:nth-child(4) { animation-delay: .26s; }
    @keyframes menuSlideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    body#apartments { padding-top: 50px; }

  /* ── BUILDING HERO ── */
    .building-hero {
      margin-top: 90px;
      position: relative;
      height: 380px;
      overflow: hidden;
    }
    .building-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .building-hero::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
    }
    .building-hero-label {
      position: absolute; bottom: 40px; left: 6%;
      z-index: 2; pointer-events: none;
    }
    .building-hero-label .b-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700; color: rgba(255,255,255,0.1);
      line-height: 1; display: block; letter-spacing: -0.04em;
    }
    .building-hero-label .b-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 600; color: #fff;
      letter-spacing: 0.04em; display: block;
    }
    .building-hero-label .b-meta {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.65);
      display: block; margin-top: 6px;
    }

    .back-btn {
      position: fixed; top: 24px; left: 24px; z-index: 99999;
      display: flex; align-items: center; gap: 8px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: #2b2b2b; text-decoration: none; transition: color 0.3s;
    }
    .back-btn::before { content: '←'; font-size: 0.9rem; transition: transform 0.3s; }
    .back-btn:hover { color: #006b5d; }
    .back-btn:hover::before { transform: translateX(-4px); }

    .floor-nav {
      position: sticky; top: 90px; z-index: 100;
      background: rgba(242,237,230,.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 12px 6%; display: flex; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
      border-bottom: 1px solid rgba(0,0,0,.06);
      animation: fadeUp .8s .15s ease both;
    }
    .floor-nav::-webkit-scrollbar { display: none; }
    .floor-nav a {
      -webkit-tap-highlight-color: transparent;
      flex: 0 0 auto; font-family: 'Quicksand', sans-serif;
      font-size: .7rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; text-decoration: none;
      color: var(--muted); padding: 7px 16px;
      border: 1px solid rgba(0,0,0,.12); border-radius: 100px;
      transition: all .3s ease; white-space: nowrap;
    }
    .floor-nav a:hover, .floor-nav a.active {
      background: var(--green); border-color: var(--green); color: #fff;
    }

    .apartments-page { padding-top: 0 !important; }

    .floor {
      padding: 70px 6% 60px; border-bottom: 1px solid rgba(0,0,0,.06);
      position: relative; animation: fadeUp .7s ease both;
    }
    .floor:nth-child(1) { animation-delay: .1s; }
    .floor:nth-child(2) { animation-delay: .2s; }
    .floor:nth-child(3) { animation-delay: .3s; }
    .floor:nth-child(4) { animation-delay: .4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .floor-header { position: relative; margin-bottom: 40px; }
    .floor-number {
      position: absolute; top: 50%; left: -2px; transform: translateY(-60%);
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 15vw, 10rem); font-weight: 700;
      color: rgba(0,0,0,.04); line-height: 1; pointer-events: none;
      user-select: none; letter-spacing: -.04em;
    }
    .floor-header-content {
      position: relative; z-index: 1; display: flex; align-items: center; gap: 24px;
    }
    .floor-accent-line { width: 40px; height: 2px; background: var(--green); flex-shrink: 0; }
    .floor-header h2 {
      font-family: 'Playfair Display', serif !important;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem) !important;
      font-weight: 600 !important; color: var(--dark) !important;
      letter-spacing: .01em !important; margin-bottom: 0 !important;
    }

    .floor-gallery.mobile-scroll {
      display: flex !important; gap: 16px !important;
      overflow-x: auto; padding-bottom: 16px;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; cursor: grab;
    }
    .floor-gallery.mobile-scroll:active { cursor: grabbing; }
    .floor-gallery.mobile-scroll::-webkit-scrollbar { height: 3px; }
    .floor-gallery.mobile-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 2px; }
    .floor-gallery.mobile-scroll::-webkit-scrollbar-thumb { background: var(--green); border-radius: 2px; }
    .floor-gallery.mobile-scroll img {
      flex: 0 0 auto !important; width: clamp(260px, 38vw, 480px) !important;
      height: 300px !important; object-fit: cover !important;
      border-radius: 4px !important; scroll-snap-align: start; cursor: pointer;
      transition: transform .4s ease, filter .4s ease, box-shadow .4s ease !important;
    }
    .floor-gallery.mobile-scroll img:first-child {
      width: clamp(300px, 45vw, 560px) !important; height: 340px !important;
    }
    .floor-gallery.mobile-scroll img:hover {
      transform: scale(1.02) !important; filter: brightness(1.06) !important;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2) !important;
    }

    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.96);
      display: flex; justify-content: center; align-items: center;
      z-index: 5000; cursor: zoom-out; animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox img {
      max-width: 92%; max-height: 90vh; border-radius: 4px;
      cursor: default; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }
    .lightbox-hint {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-family: 'Quicksand', sans-serif; font-size: 0.65rem;
      letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.4);
    }

    .contact-info { position: relative; }
    .contact-info::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 40px; height: 1px; background: #006b5d; opacity: 0.5;
    }
    .contact-info p {
      font-family: 'Quicksand', sans-serif; font-size: 0.9rem;
      letter-spacing: 0.08em; margin-bottom: 8px; color: #666;
    }
    .contact-info a { color: #006b5d !important; position: relative; }
    .contact-info a::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 100%; height: 1px; background: #006b5d;
      transform: scaleX(0); transform-origin: right; transition: transform 0.4s ease;
    }
    .contact-info a:hover::after { transform: scaleX(1); transform-origin: left; }

    :target { scroll-margin-top: 160px; }

    @media (max-width: 768px) {
      .building-hero-dual { height: 240px; margin-top: 90px; }
      .floor { padding: 40px 4% 36px; }
      .floor-gallery.mobile-scroll img { width: 80vw !important; height: 220px !important; }
      .floor-gallery.mobile-scroll img:first-child { width: 88vw !important; height: 250px !important; }
      .back-btn { top: 16px; left: 16px; }
    }

  </style>
</head>
<body id="apartments">

  <a href="index.html" class="back-btn">Nazad</a>

  <div class="hamburger" id="hamburger" role="button" tabindex="0" aria-label="Toggle navigation">

  <!-- BUILDING HERO — 2 images -->

  <script src="script.js"></script>
  <script>
    document.querySelectorAll('.floor-gallery img').forEach(img => {
      img.addEventListener('click', () => {
        const lb = document.createElement('div');
        lb.className = 'lightbox';
        lb.innerHTML = `<img src="${img.src}" alt="${img.alt}"><span class="lightbox-hint">Kliknite bilo gdje za zatvaranje</span>`;
        document.body.appendChild(lb);
        document.body.style.overflow = 'hidden';
        const close = () => { document.body.removeChild(lb); document.body.style.overflow = ''; };
        lb.addEventListener('click', close);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); }, { once: true });
      });
    });

    const navLinks = document.querySelectorAll('.floor-nav a');
    const floorSections = document.querySelectorAll('.floor');
    const floorNav = document.getElementById('floorNav');
    function updateActiveNav() {
      const offset = (document.querySelector('.header')?.offsetHeight || 90) + (floorNav?.offsetHeight || 48) + 10;
      let best = null, bestDist = Infinity;
      floorSections.forEach(s => { const dist = Math.abs(s.getBoundingClientRect().top - offset); if (dist < bestDist) { bestDist = dist; best = s; } });
      if (best) {
        navLinks.forEach(a => a.classList.remove('active'));
        const a = document.querySelector(`.floor-nav a[href="#${best.id}"]`);
        if (a) { a.classList.add('active'); a.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
      }
    }
    window.addEventListener('scroll', updateActiveNav, { passive: true });
    updateActiveNav();

    document.querySelectorAll('.floor-gallery.mobile-scroll').forEach(g => {
      let down = false, startX, scrollLeft;
      g.addEventListener('mousedown',  e => { down = true; startX = e.pageX - g.offsetLeft; scrollLeft = g.scrollLeft; });
      g.addEventListener('mouseleave', () => down = false);
      g.addEventListener('mouseup',    () => down = false);
      g.addEventListener('mousemove',  e => { if (!down) return; e.preventDefault(); g.scrollLeft = scrollLeft - (e.pageX - g.offsetLeft - startX) * 1.5; });
    });

    if (window.location.hash) {
      setTimeout(() => { const t = document.querySelector(window.location.hash); if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 200);
    }

    document.getElementById('hamburger').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById('hamburger').click(); }
    });
  </script>
